<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Materia Eterea</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --background: #f5f2ef;
      --text: #151515;
      --gold: #a88655;
      --footer: #6d6862;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: "Cinzel", serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 22px;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      width: min(100%, 1000px);
      transform: translateY(20px);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 5.8vw, 76px);
      font-weight: 400;
      letter-spacing: 0.14em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      width: min(620px, 80%);
      margin: 38px auto 28px;
      color: var(--gold);
    }

    .line {
      position: relative;
      flex: 1;
      height: 1px;
      background: rgba(168, 134, 85, 0.55);
    }

    .line.left::after,
    .line.right::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      transform: translateY(-50%);
    }

    .line.left::after {
      right: -2px;
    }

    .line.right::before {
      left: -2px;
    }

    .symbol {
      position: relative;
      width: 48px;
      height: 48px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .symbol::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      width: 26px;
      height: 26px;
      border-left: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
      border-bottom: 1px solid var(--gold);
      transform: translateX(-50%) rotate(45deg);
    }

    .symbol::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 9px;
      width: 1px;
      height: 29px;
      background: var(--gold);
      transform: translateX(-50%);
    }

    .subtitle {
      margin: 0;
      color: var(--gold);
      font-size: clamp(12px, 1.55vw, 20px);
      letter-spacing: 0.32em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    footer {
      padding-top: 24px;
      text-align: center;
    }

    footer a {
      display: inline-block;
      color: var(--footer);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(109, 104, 98, 0.45);
      padding-bottom: 4px;
      transition:
        color 160ms ease,
        border-color 160ms ease;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--text);
      border-color: var(--text);
    }

    @media (max-width: 700px) {
      .page {
        padding: 24px 18px 18px;
      }

      .hero-content {
        transform: none;
      }

      h1 {
        letter-spacing: 0.1em;
      }

      .ornament {
        width: 88%;
        gap: 15px;
        margin-top: 30px;
      }

      .symbol {
        width: 42px;
        height: 42px;
      }

      .subtitle {
        letter-spacing: 0.2em;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-content">
        <h1>Materia Eterea</h1>

        <div class="ornament" aria-hidden="true">
          <span class="line left"></span>
          <span class="symbol"></span>
          <span class="line right"></span>
        </div>

        <p class="subtitle">
          Spiritualità pratica e alchimia interiore
        </p>
      </div>
    </section>

    <footer>
      <a href="/privacy/">
        Privacy Policy
      </a>
    </footer>
  </main>
</body>
</html>
