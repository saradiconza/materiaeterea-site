<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Materia Eterea</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --background: #f5f2ef;
      --text: #151515;
      --gold: #a88655;
      --footer: #6d6862;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: "Cinzel", serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 30px 24px 22px;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      width: min(100%, 900px);
      transform: translateY(35px);
    }

    h1 {
      margin: 0;
      font-size: clamp(31px, 4.4vw, 58px);
      font-weight: 400;
      letter-spacing: 0.12em;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: min(540px, 78%);
      margin: 34px auto 27px;
    }

    .line {
      position: relative;
      flex: 1;
      height: 1px;
      background: rgba(168, 134, 85, 0.55);
    }

    .line.left::after,
    .line.right::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      transform: translateY(-50%);
    }

    .line.left::after {
      right: -2px;
    }

    .line.right::before {
      left: -2px;
    }

    .logo {
      display: block;
      width: 38px;
      height: 38px;
      object-fit: contain;
      opacity: 0.93;
      flex: 0 0 auto;
    }

    .subtitle {
      margin: 0;
      color: var(--gold);
      font-size: clamp(11px, 1.25vw, 17px);
      letter-spacing: 0.28em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    footer {
      padding-top: 24px;
      text-align: center;
    }

    footer a {
      display: inline-block;
      color: var(--footer);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(109, 104, 98, 0.42);
      padding-bottom: 4px;
      transition:
        color 160ms ease,
        border-color 160ms ease;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--text);
      border-color: var(--text);
    }

    @media (max-width: 700px) {
      .page {
        padding: 24px 17px 18px;
      }

      .hero-content {
        transform: none;
      }

      h1 {
        font-size: clamp(29px, 9vw, 43px);
        letter-spacing: 0.08em;
      }

      .ornament {
        width: 88%;
        gap: 13px;
        margin-top: 28px;
      }

      .logo {
        width: 35px;
        height: 35px;
      }

    .subtitle {
    max-width: 430px;
    margin-inline: auto;
    font-size: 15px;
    letter-spacing: 0.16em;
    line-height: 1.8;
}

  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-content">
        <h1>Materia Eterea</h1>

        <div class="ornament">
          <span class="line left" aria-hidden="true"></span>

          <img
            class="logo"
            src="/logo.png"
            alt="Logo Materia Eterea"
          >

          <span class="line right" aria-hidden="true"></span>
        </div>

        <p class="subtitle">
          Spiritualità pratica e alchimia interiore
        </p>
      </div>
    </section>

    <footer>
      <a href="/privacy/">
        Privacy Policy
      </a>
    </footer>
  </main>
</body>
</html>
