<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Materia Eterea</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --background: #f5f2ef;
      --text: #151515;
      --gold: #b68d57;
      --footer: #6d6862;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: "Cinzel", serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 22px;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      width: min(100%, 1000px);
      transform: translateY(35px);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.12em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: min(620px, 80%);
      margin: 36px auto 26px;
      color: var(--gold);
      opacity: 0.92;
    }

    .line {
      position: relative;
      flex: 1;
      height: 1px;
      background: rgba(182, 141, 87, 0.55);
    }

    .line.left::after,
    .line.right::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      transform: translateY(-50%);
    }

    .line.left::after {
      right: -2px;
    }

    .line.right::before {
      left: -2px;
    }

    .alchemy-symbol {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: block;
    }

    .alchemy-symbol * {
      vector-effect: non-scaling-stroke;
    }

    .subtitle {
      margin: 0;
      color: var(--gold);
      font-size: clamp(10px, 1.15vw, 15px);
      letter-spacing: 0.28em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    footer {
      padding-top: 24px;
      text-align: center;
    }

    footer a {
      display: inline-block;
      color: var(--footer);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(109, 104, 98, 0.45);
      padding-bottom: 4px;
      transition:
        color 160ms ease,
        border-color 160ms ease;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--text);
      border-color: var(--text);
    }

    @media (max-width: 700px) {
      .page {
        padding: 24px 18px 18px;
      }

      .hero-content {
        transform: none;
      }

      h1 {
        letter-spacing: 0.1em;
      }

      .ornament {
        width: 88%;
        gap: 14px;
        margin-top: 30px;
      }

      .alchemy-symbol {
        width: 38px;
        height: 38px;
      }

      .subtitle {
        letter-spacing: 0.18em;
        line-height: 1.7;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-content">

        <h1>Materia Eterea</h1>

        <div class="ornament" aria-hidden="true">
          <span class="line left"></span>

          <svg
            class="alchemy-symbol"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <g
              fill="none"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <!-- Cerchio esterno -->
              <circle cx="50" cy="50" r="46"></circle>

              <!-- Triangolo -->
              <path d="M50 9 L90 80 L10 80 Z"></path>

              <!-- Quadrato -->
              <rect x="28" y="42" width="44" height="38"></rect>

              <!-- Cerchio interno -->
              <circle cx="50" cy="61" r="17"></circle>

              <!-- Linea verticale centrale -->
              <path d="M50 9 L50 80"></path>
            </g>
          </svg>

          <span class="line right"></span>
        </div>

        <p class="subtitle">
          Spiritualità pratica e alchimia interiore
        </p>

      </div>
    </section>

    <footer>
      <a href="/privacy/">
        Privacy Policy
      </a>
    </footer>
  </main>
</body>
</html>
